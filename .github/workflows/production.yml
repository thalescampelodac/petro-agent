name: Production

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    name: Validate and deploy production
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run verify:ci

      - name: Pull Vercel production environment
        if: env.VERCEL_TOKEN != ''
        run: npx vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Build production
        if: env.VERCEL_TOKEN != ''
        run: npx vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy production
        if: env.VERCEL_TOKEN != ''
        run: npx vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
